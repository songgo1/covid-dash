<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>Stlite app</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@stlite/browser@0.85.1/build/stlite.css"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
import { mount } from "https://cdn.jsdelivr.net/npm/@stlite/browser@0.85.1/build/stlite.js"
mount(
  {
    requirements: ["pandas", "plotly", "streamlit"],
    entrypoint: "streamlit_app.py",
    files: {
"streamlit_app.py": `import pandas as pd
import plotly.express as px
import plotly.graph_objects as go
import streamlit as st


#import and tidy data
url = "https://raw.githubusercontent.com/CSSEGISandData/COVID-19/master/csse_covid_19_data/csse_covid_19_time_series/time_series_covid19_confirmed_global.csv"

data = pd.read_csv(url)

#edit 03/09/2026: THIS DATA IS CUMULATIVE COUNTS!!!!!!!!!!!!!!!!!!!

data['Province/State'] = data['Province/State'].fillna(data['Country/Region'])

#save coords for map 
coords = data[['Province/State','Country/Region', 'Lat', 'Long']].copy()
data.drop(['Lat', 'Long'], inplace = True, axis =1)

#add us state data
##remove us from original df
coords = coords[~coords['Country/Region'].isin(['US'])].copy()
data = data[~data['Country/Region'].isin(['US'])].copy()

url = "https://raw.githubusercontent.com/CSSEGISandData/COVID-19/master/csse_covid_19_data/csse_covid_19_time_series/time_series_covid19_confirmed_US.csv"

us_data = pd.read_csv(url)

#unify names
us_data.rename(columns={'Province_State': 'Province/State', 'Country_Region': 'Country/Region', 'Long_': 'Long'}, inplace=True)
#get coords then drop unnecessary col
us_coords = us_data[['Province/State','Country/Region', 'Lat', 'Long']].copy()
us_data.drop(['Lat', 'Long','UID', 'iso2', 'iso3', 'code3', 'FIPS', 'Admin2','Combined_Key', ], inplace = True, axis =1)

#add to df
coords = pd.concat([coords, us_coords])
data = pd.concat([data, us_data])


#convert to DAILY counts
data = data.set_index(['Province/State', 'Country/Region'])
first_col = data.iloc[:, 0].copy()  #save first column (since nothing to sub from)
data = data.diff(axis=1).fillna(0)
data.iloc[:, 0] = first_col  #restore first column
data.reset_index(inplace = True)

#group data by country and save df for line plot
cont_combined = data.copy()
cont_combined = cont_combined.drop(columns=['Province/State'])
cont_combined = cont_combined.groupby(['Country/Region']).sum().transpose()

#melt for plotly barchart
long = pd.melt(data, id_vars=['Province/State', 'Country/Region',])

#convert to datetime for easy subsetting
long['date'] = pd.to_datetime(long['variable'], format="%m/%d/%y")

#default/inputs
min_d = long['date'].min()
max_d = long['date'].max()
countries_list = list(data['Country/Region'].unique())

#functions to make new df from inputs 
def choose_countries(long_data, wide_data, countries):
    selected_cont = long_data.copy()
    selected_cont = selected_cont[selected_cont['Country/Region'].isin(countries)].copy() #df for barchart
    wide_select = wide_data[countries].copy() #df for line plot
    return selected_cont, wide_select

def choose_dates(data, end_date, start_date):
    selected_dates = data.copy()
    start_date = pd.to_datetime(start_date) #cast datetime to pandas datetime
    end_date = pd.to_datetime(end_date) #cast datetime to pandas datetime

    selected_dates = selected_dates[selected_dates['date'] >= start_date].copy() #for daily there is no start date so it will default to min date
    selected_dates = selected_dates[selected_dates['date'] <= end_date].copy()
    return selected_dates
    
def daily_counts(data):
    end = data['date'].max()
    d = data[data['date'] == end].copy()
    return d

def cumsum_counts(data):
    d = data.groupby(['Province/State','Country/Region'])['value'].sum().to_frame()
    d['end'] = data['date'].max()
    d['start'] = data['date'].min()
    d.reset_index(inplace= True)
    return d


#user inputs from streamlit

st.title("Welcome to the 140.628 COVID Dashboard!")
st.write("""

This app allows you to see the daily or cumulative case counts of COVID cases by country.
This data was collected by the [Center for Systems Science and Engineering (CSSE)](https://github.com/CSSEGISandData/COVID-19) at Johns Hopkins University. \\\\
It contains global case counts from  **1/22/20 - 3/9/23**.   

Data can be accessed [here.](https://github.com/CSSEGISandData/COVID-19/tree/master/csse_covid_19_data/csse_covid_19_time_series)

### How to Use This Dashboard:
1. **Select countries** from the dropdown menu (you can choose multiple)
2. **Choose display type**: Daily or Cumulative counts
3. **Select date(s)**: 
    - For Daily: pick a single date
    - For Cumulative: pick a start and end date range
4. **View the bar chart and line plot** showing case counts by country/region
    - Barchart is split by states/provinces/dependencies for each country if data is available.  
5. **Explore the map** - hover over markers to see location-specific counts for selected countries.
Size of dot corresponds to count. 

Note: In some instances, the daily count number is reported as negative. The JHU CSSE COVID-19 Data is
reported as cumulative counts and daily counts were back calculated. In the event that the cumulative 
number of cases was downgraded from the day before, the listed daily count is negative and will not
be shown on the map. 

""")
         
#make layout
###inputs on the right and graph on the left 
col1, col2= st.columns([3,1], vertical_alignment="center")


with col2:
    ##select countries
    country = st.multiselect(
        "Select your countries of interest",
        countries_list,
        #default=["US"],
    )

    ##select daily or cumsum 
    ### if daily: select date
    ### if cumsum: select start and end

    option = st.selectbox(
            "Daily count or cumulative case counts",
            ("Daily", "Cumulative"),
        )

    if option == 'Daily':
        selected_date_end = st.date_input(
            "Select date between 1/22/20 - 3/9/23",
                value=min_d,
                min_value=min_d,
                max_value=max_d,
                format="MM.DD.YYYY",
            )
        st.write(f'Selected date: {selected_date_end.strftime("%m/%d/%Y")}')

        selected_start_date = min_d

        

    if option == 'Cumulative':
        selected_start = st.date_input("Select start date",
            value=min_d,
            min_value=min_d,
            max_value=max_d,
            format="MM.DD.YYYY",
            )

        selected_end = st.date_input(
            "Select end date",
                value=max_d,
                min_value=min_d, 
                max_value=max_d,
                format="MM.DD.YYYY",
            )
        
        #make sure start and end are defined correctly
        ## handles edge case if user picks end day that is before start
        selected_start_date = min(selected_start, selected_end)
        selected_date_end = max(selected_start, selected_end)
        st.write(f'Selected start date: {selected_start_date.strftime("%m/%d/%Y")}')
        st.write(f'Selected end date: {selected_date_end.strftime("%m/%d/%Y")}')

#bulid the df for barchart and do cumsum on combined if cumulative
selected_count, combined = choose_countries(long, cont_combined, country)
selected = choose_dates(selected_count, selected_date_end, selected_start_date)

if option == 'Daily':
    result = daily_counts(selected)
    title = f'Daily counts for {selected_date_end.strftime("%m/%d/%Y")}'

if option == 'Cumulative':
    result = cumsum_counts(selected)
    title = f'Cumulative case counts for {selected_start_date.strftime("%m/%d/%Y")} to {selected_date_end.strftime("%m/%d/%Y")}'
    combined = combined.cumsum()
    
             
result = result.rename(columns={'Province/State': 'Location'})

combined.reset_index(inplace = True)
combined = pd.melt(combined, id_vars =['index']).copy()
combined['date'] = pd.to_datetime(combined['index'], format="%m/%d/%y")

#make barchart
with col1:
    fig = px.bar(result,
                  x='Country/Region',
                  y='value',
                  title=f"{title}",
                color = 'Location',
                labels={"value":'Counts',},
            )

    st.plotly_chart(fig,
                    use_container_width=True)


#add line plot
fig_overall = px.line(combined,
               x="date",
               y="value",
               color = 'Country/Region',
               title=f'{option} Counts for 1/22/20 - 3/9/23',
               )


if option == 'Daily':
    #group by country for results markers
    results_markers  = result.drop(columns=['Location', 'variable'])
    results_markers = results_markers.groupby(['Country/Region', 'date']).sum()
    results_markers.reset_index(inplace = True) 

    fig_overall.add_trace(
        go.Scatter(
            mode='markers',
            x=results_markers['date'],
            y=results_markers['value'],
            marker=dict(size=20),
            name="Selected date",
            ),
            )

if option == 'Cumulative':
    #group by country for results markers
    results_markers  = result.drop(columns=['Location'])
    results_markers = results_markers.groupby(['Country/Region', 'end', 'start']).sum()
    results_markers.reset_index(inplace = True) 

    start_dates = results_markers['start'].tolist()
    start_data = combined[combined['date'].isin(start_dates)]

    end_dates = results_markers['end'].tolist()
    end_data = combined[combined['date'].isin(end_dates)]

    fig_overall.add_trace(
        go.Scatter(
            mode='markers',
            x=end_data['date'],
            y=end_data['value'],
            marker=dict(size=20),
            name="Selected end",
        ),
        )
    
    
    fig_overall.add_trace(
        go.Scatter(
            mode='markers',
            x=start_data['date'],
            y=start_data['value'],
            marker=dict(size=20),
            name="Selected start",
        ),
        )


st.plotly_chart(fig_overall,
                    use_container_width=True)

#add map 
st.write("Hover over markers to see counts.")

coords_sub = coords[coords['Country/Region'].isin(country)].copy()

coords_sub = coords_sub.merge(
    result, 
    left_on=['Province/State', 'Country/Region'], 
    right_on=['Location', 'Country/Region']
)

#remove out zero/negative values before mapping
coords_sub = coords_sub[coords_sub['value'] > 0]


fig_map = px.scatter_geo(
    coords_sub,
    lat='Lat',
    lon='Long',
    hover_name='Location',
    hover_data={'value': True},
    title=f"Map of {option} counts", 
    size="value",
)

st.plotly_chart(fig_map, use_container_width=True)

st.write("Reference data: Dong E, Du H, Gardner L. An interactive web-based dashboard to track COVID-19 in real time. Lancet Inf Dis. 20(5):533-534. doi: 10.1016/S1473-3099(20)30120-1")`,

},
  },
  document.getElementById("root")
)

    </script>
  </body>
